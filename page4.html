  <script>
    // استرجاع التاريخ من sessionStorage عند تحميل الصفحة
    const birthDate = sessionStorage.getItem('userBirthDate');
    
    if (birthDate) {
      // تنسيق التاريخ للعرض (اختياري)
      const formattedDate = new Date(birthDate).toLocaleDateString('ar-EG');
      document.getElementById('displayDate').textContent = formattedDate;
    } else {
      document.getElementById('displayDate').textContent = '*تاريخ لم تدخليه*';
    }
